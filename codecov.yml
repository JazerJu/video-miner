codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 5%
    patch:
      default:
        target: 50%

ignore:
  - "backend/vid_under/**"
  - "backend/asr_utils/**"
  - "backend/utils/**"
  - "backend/video/tasks.py"
  - "backend/third_party/**"
  - "backend/**/migrations/**"
  - "backend/**/tests.py"
  - "backend/**/tests_*.py"
  - "backend/**/tests/**"
  - "backend/manage.py"
  - "backend/run_all.sh"
  # Model/GPU dependent — integration test territory
  - "backend/video/consumers.py"
  - "backend/video/stream_transcriber.py"
  - "backend/video/asr_engine.py"
  - "backend/video/services/audio_processing.py"
  # ASGI/WSGI entry points — runtime only
  - "backend/vid_go/asgi.py"
  - "backend/vid_go/wsgi.py"
  - "backend/vid_go/mcp_asgi.py"
  # Scratch/experimental scripts
  - "backend/zt_speed_test.py"
  - "backend/visualize_librispeech_results.py"
  - "backend/visualize_results.py"

comment:
  layout: "reach, diff, flags, files"
  show_carryforward_flags: true
