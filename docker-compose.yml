services:
  vidgo:
    image: ${VIDGO_IMAGE}
    container_name: vidgo-app
    restart: unless-stopped
    runtime: nvidia
    network_mode: bridge
    user: "${UID}:${GID}"  # 使用宿主机用户运行，避免权限问题
    env_file:
      - .env
    ports:
      - "${VIDGO_PORT}:8080"
      - "${VIDGO_MCP_PORT}:${MCP_PORT}"
    extra_hosts:
      - "host.docker.internal:host-gateway"  # 让容器能通过 host.docker.internal 访问宿主机
    environment:
      # Most settings are passed through from .env. These map VidGo's
      # prefixed names to process env names expected by runtimes/libraries.
      LD_LIBRARY_PATH: ${VIDGO_LD_LIBRARY_PATH}
      HTTP_PROXY: ${VIDGO_HTTP_PROXY}
      HTTPS_PROXY: ${VIDGO_HTTPS_PROXY}
      NO_PROXY: ${VIDGO_NO_PROXY}
    volumes:
      # 数据库文件
      - ./data/videos.db:/app/database/videos.db
      # 媒体文件目录
      - ./data/media:/app/media
      # 用户配置目录
      - ./data/config:/app/config
      # 模型根目录：承载 VidUnder、FunASR、GLM-ASR 等模型
      - ./data/models:/app/models
